<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D方块世界</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #8B4513;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
        }

        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #8B4513;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }
        .menu-title {
            font-size: 4rem;
            font-weight: bold;
            color: black;
            margin-bottom: 50px;
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.2);
        }
        .menu-btn {
            background: transparent;
            border: 4px solid black;
            color: black;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            width: 250px;
            text-align: center;
        }
        .menu-btn:active {
            transform: scale(0.95);
            background: rgba(0, 0, 0, 0.1);
        }

        #world-select-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #808080;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
        }
        .select-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 40px;
        }

        #view-worlds-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #808080;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 102;
            color: white;
        }

        #settings-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #808080;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 101;
            color: white;
        }
        .settings-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 40px;
        }
        .setting-row {
            width: 300px;
            margin-bottom: 30px;
        }
        .setting-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        input[type=range] {
            width: 100%;
            height: 8px;
            cursor: pointer;
        }

        #control-edit-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #808080;
            display: none;
            z-index: 103;
        }
        #control-edit-hint {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #4CAF50;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }
        #control-edit-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .edit-btn-proxy {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border: 2px solid white;
            z-index: 10;
            touch-action: none;
        }
        .edit-btn-percent {
            position: absolute;
            top: -28px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #4CAF50;
            font-weight: bold;
            font-size: 12px;
            pointer-events: auto;
            z-index: 25;
            background: rgba(0, 0, 0, 0.8);
            padding: 2px 0;
            border-radius: 4px;
            border: 1px solid #4CAF50;
            user-select: none;
        }

        #keymap-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #808080;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 104;
            color: white;
        }

        #edit-menu {
            display: none;
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid white;
            padding: 15px;
            border-radius: 10px;
            z-index: 105;
            color: white;
            min-width: 220px;
        }

        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #333;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99;
            color: white;
        }
        .progress-container {
            width: 300px;
            height: 30px;
            border: 2px solid white;
            margin-top: 20px;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #4CAF50;
            transition: width 0.2s;
        }

        #game-ui {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 2px black;
        }
        #crosshair::before {
            top: 9px;
            left: 0;
            width: 20px;
            height: 2px;
        }
        #crosshair::after {
            top: 0;
            left: 9px;
            width: 2px;
            height: 20px;
        }

        .game-btn {
            position: absolute;
            right: 40px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid white;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 20;
            touch-action: none;
        }
        .game-btn:active {
            transform: scale(0.92);
        }

        #break-btn {
            bottom: 190px;
            background: rgba(255, 0, 0, 0.3);
        }
        #break-btn:active {
            background: rgba(255, 0, 0, 0.6);
        }

        #place-btn {
            bottom: 280px;
            background: rgba(0, 100, 255, 0.3);
        }
        #place-btn:active {
            background: rgba(0, 100, 255, 0.6);
        }

        #select-btn {
            bottom: 370px;
            background: rgba(0, 200, 100, 0.3);
            font-size: 0.75rem;
        }
        #select-btn:active {
            background: rgba(0, 200, 100, 0.6);
        }

        #jump-btn {
            bottom: 100px;
            background: rgba(255, 165, 0, 0.3);
        }
        #jump-btn:active {
            background: rgba(255, 165, 0, 0.6);
        }

        #coords {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px;
            font-size: 14px;
            pointer-events: none;
            z-index: 20;
        }

        #btn-return-main {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid white;
            padding: 5px 10px;
            pointer-events: auto;
            z-index: 20;
            cursor: pointer;
        }
        #btn-return-main:active {
            background: rgba(0, 0, 0, 0.8);
        }

        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 150px;
            height: 150px;
            pointer-events: auto;
            touch-action: none;
            z-index: 20;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
        }
        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .version-info {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            text-align: right;
            pointer-events: none;
        }
        #menu-version {
            bottom: 20px;
            right: 20px;
            color: rgba(0, 0, 0, 0.5);
        }

        /* ===== 自定义弹窗 ===== */
        #custom-prompt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            touch-action: none;
        }
        #custom-prompt-box {
            background: #ffffff;
            border: 4px solid #000000;
            border-radius: 14px;
            padding: 32px 36px 28px 36px;
            min-width: 300px;
            max-width: 92%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
            touch-action: auto;
            position: relative;
        }
        #prompt-title {
            color: #000000;
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 22px;
            font-weight: 700;
            line-height: 1.4;
        }
        #prompt-input-wrapper {
            margin-bottom: 12px;
            position: relative;
        }
        #prompt-input {
            width: 100%;
            border: none;
            border-bottom: 2.5px solid #222;
            outline: none;
            font-size: 1.2rem;
            padding: 8px 0 6px 0;
            background: transparent;
            color: #000000;
            transition: border-color 0.25s;
            border-radius: 0;
            -webkit-appearance: none;
            appearance: none;
        }
        #prompt-input:focus {
            border-bottom-color: #000000;
        }
        #prompt-error {
            color: #d32f2f;
            font-size: 0.9rem;
            min-height: 1.4rem;
            text-align: center;
            margin-bottom: 12px;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        #prompt-error.hidden {
            opacity: 0;
            min-height: 0;
            margin-bottom: 0;
        }
        #prompt-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 6px;
        }
        .prompt-btn {
            background: transparent;
            border: 2.5px solid #000000;
            color: #000000;
            padding: 10px 38px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.15s, transform 0.1s;
            touch-action: manipulation;
            min-width: 100px;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .prompt-btn:active {
            transform: scale(0.94);
            background: rgba(0, 0, 0, 0.08);
        }
        .prompt-btn-confirm {
            background: #000000;
            color: #ffffff;
        }
        .prompt-btn-confirm:active {
            background: #333333;
        }
        .prompt-btn-cancel:active {
            background: rgba(0, 0, 0, 0.06);
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            #custom-prompt-box {
                padding: 24px 20px 22px 20px;
                min-width: 0;
                width: 90%;
            }
            #prompt-title {
                font-size: 1.2rem;
            }
            #prompt-input {
                font-size: 1.05rem;
                padding: 6px 0 4px 0;
            }
            .prompt-btn {
                padding: 10px 24px;
                font-size: 1.05rem;
                min-width: 80px;
            }
            #prompt-buttons {
                gap: 14px;
            }
        }
    </style>
</head>
<body>

    <div id="main-menu">
        <div class="menu-title">3D方块世界</div>
        <button class="menu-btn" id="btn-start">开始游戏</button>
        <button class="menu-btn" id="btn-settings">设置</button>
        <div class="version-info" id="menu-version">小坤坤<br>版本号：1.2</div>
    </div>

    <div id="world-select-screen">
        <div class="select-title">选择世界</div>
        <button class="menu-btn" id="btn-create-random" style="border-color:white; color:white; width:300px;">创建随机世界</button>
        <button class="menu-btn" id="btn-create-flat" style="border-color:white; color:white; width:300px; margin-top:10px;">创建超平坦世界</button>
        <button class="menu-btn" id="btn-view-worlds" style="border-color:white; color:white; width:300px; margin-top:10px;">查看缓存世界</button>
        <button class="menu-btn" id="btn-clear-worlds" style="border-color:white; color:white; width:300px; margin-top:10px;">清除缓存世界</button>
        <button class="menu-btn" id="btn-back-menu" style="border-color:white; color:white; width:300px; margin-top:30px;">返回主菜单</button>
    </div>

    <div id="view-worlds-screen">
        <div style="font-size:2rem; color:white; margin-bottom:20px;">缓存世界</div>
        <div id="view-worlds-list" style="display:flex; flex-direction:column; align-items:center; max-height:60vh; overflow-y:auto;"></div>
        <button class="menu-btn" id="btn-view-worlds-back" style="border-color:white; color:white; width:300px; margin-top:30px;">退出</button>
    </div>

    <div id="settings-screen">
        <div class="settings-title">设置</div>
        <div class="setting-row">
            <div class="setting-label"><span>灵敏度</span><span id="sensitivity-val">100%</span></div>
            <input type="range" id="sensitivity-slider" min="50" max="500" value="100">
        </div>
        <div class="setting-row">
            <div class="setting-label"><span>渲染距离</span><span id="render-val">r=6</span></div>
            <input type="range" id="render-slider" min="5" max="20" value="6">
        </div>
        <div class="setting-row" style="display:flex; justify-content:space-between; align-items:center; width:300px; margin-bottom:30px;">
            <span style="font-size:1.1rem;">超平坦生成树</span>
            <input type="checkbox" id="flat-tree-toggle" style="width:20px; height:20px; cursor:pointer;">
        </div>
        <div class="setting-row" style="display:flex; justify-content:space-between; align-items:center; width:300px; margin-bottom:30px;">
            <span style="font-size:1.1rem;">调试按钮</span>
            <input type="checkbox" id="debug-btn-toggle" style="width:20px; height:20px; cursor:pointer;">
        </div>
        <button class="menu-btn" id="btn-control-edit" style="border-color:white; color:white; width:300px; margin-top:10px;">操作方式</button>
        <button class="menu-btn" id="btn-save-exit" style="border-color:white; color:white; margin-top:20px;">保存并退出</button>
    </div>

    <div id="control-edit-screen">
        <div id="control-edit-hint">拖动改变按钮位置，长按编辑按钮</div>
        <div id="control-edit-area"></div>
        <button class="menu-btn" id="btn-control-save" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); border-color:white; color:white;">保存并退出</button>
    </div>

    <div id="keymap-screen">
        <div style="font-size:2rem; color:white; margin-bottom:10px;">按键映射</div>
        <div id="keymap-hint" style="color:white; margin-bottom:10px;">点击选择按键</div>
        <div id="keymap-grid" style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px; max-width:90%;"></div>
        <button class="menu-btn" id="btn-keymap-back" style="border-color:white; color:white; margin-top:30px;">返回</button>
    </div>

    <div id="edit-menu">
        <div style="margin-bottom:10px; font-weight:bold; text-align:center;">按钮设置</div>
        <div style="margin-bottom:10px;">
            <div>大小: <span id="edit-size-val">100%</span></div>
            <input type="range" id="edit-size" min="50" max="300" value="100" style="width:100%;">
        </div>
        <div style="margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
            <span>游戏内隐藏</span>
            <input type="checkbox" id="edit-hidden">
        </div>
        <button class="menu-btn" id="btn-edit-keymap" style="border-color:white; color:white; width:100%; margin:5px 0; padding:8px; font-size:1rem;">键鼠相对按键</button>
        <button class="menu-btn" id="btn-edit-menu-save" style="border-color:white; color:white; width:100%; margin-top:5px; padding:8px; font-size:1rem;">保存并退出</button>
    </div>

    <div id="loading-screen">
        <div style="font-size: 1.5rem;">正在进入方块世界……</div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <div id="game-ui">
        <div id="crosshair"></div>
        <div id="coords">X: 0 Y: 0 Z: 0</div>
        <button id="btn-return-main">返回主菜单</button>

        <div class="game-btn" id="select-btn">草块</div>
        <div class="game-btn" id="place-btn">放置</div>
        <div class="game-btn" id="break-btn">破坏</div>
        <div class="game-btn" id="jump-btn">跳跃</div>

        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>
        <div class="version-info">小坤坤<br>版本号：1.2</div>
    </div>

    <!-- ===== 自定义弹窗 ===== -->
    <div id="custom-prompt-overlay">
        <div id="custom-prompt-box">
            <div id="prompt-title">请输入世界名称：</div>
            <div id="prompt-input-wrapper">
                <input type="text" id="prompt-input" autocomplete="off" spellcheck="false">
            </div>
            <div id="prompt-error" class="hidden"></div>
            <div id="prompt-buttons">
                <button class="prompt-btn prompt-btn-confirm" id="prompt-confirm">确定</button>
                <button class="prompt-btn prompt-btn-cancel" id="prompt-cancel">取消</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            chunkSize: 10,
            cameraHeight: 1.6,
            moveSpeed: 5,
            gravity: 25,
            blockSize: 1,
            reach: 5,
            worldBottom: -100
        };

        let scene, camera, renderer;
        let worldBlocks = {};
        let blockMeshes = {};
        let blockMeshesArray = [];
        let activeBlocks = new Set();
        let chunkBlocks = {};
        let generatedChunks = new Set();
        let renderedChunks = new Set();
        let destroyedBlocks = new Set();
        let placedBlocks = {};
        let naturalLeaves = new Set();
        let leavesDecayTimers = {};
        let saplingTimers = {};

        let player = { x: 0, y: 1.6, z: 0, vx: 0, vy: 0, vz: 0, onGround: false };
        let input = { w: false, a: false, s: false, d: false };
        let joystick = { active: false, dx: 0, dy: 0 };
        let lookInput = { active: false, lastX: 0, lastY: 0 };
        let yaw = 0,
            pitch = 0;
        let lastTime = 0;
        let isGameRunning = false;
        let gravityEnabled = false;

        let currentWorld = null;
        let worlds = [];

        let settings = { sensitivity: 100, renderDistance: 6, debugBtn: false, flatTree: true };

        let controlSettings = {
            buttons: {
                'break-btn': { size: 100, hidden: false, key: 'LMB', pos: { right: 40, bottom: 190 } },
                'place-btn': { size: 100, hidden: false, key: 'RMB', pos: { right: 40, bottom: 280 } },
                'select-btn': { size: 100, hidden: false, key: null, pos: { right: 40, bottom: 370 } },
                'jump-btn': { size: 100, hidden: false, key: 'Space', pos: { right: 40, bottom: 100 } },
                'joystick-zone': { size: 100, hidden: false, keys: { forward: 'w', back: 's', left: 'a', right: 'd' },
                    pos: { left: 40, bottom: 40 } }
            }
        };

        const blockTypes = ['grass', 'dirt', 'stone', 'bedrock', 'wood', 'leaves', 'plank', 'sapling'];
        const blockNames = { grass: '草块', dirt: '土块', stone: '石块', bedrock: '基岩', wood: '木块', leaves: '树叶',
            plank: '木板', sapling: '树苗' };
        let selectedType = 'grass';

        const touchRoles = {};

        // ===== 自定义弹窗系统 =====
        let promptResolve = null;
        let promptReject = null;

        function showCustomPrompt(title) {
            return new Promise((resolve, reject) => {
                const overlay = document.getElementById('custom-prompt-overlay');
                const input = document.getElementById('prompt-input');
                const errorEl = document.getElementById('prompt-error');
                const titleEl = document.getElementById('prompt-title');
                const confirmBtn = document.getElementById('prompt-confirm');
                const cancelBtn = document.getElementById('prompt-cancel');

                titleEl.textContent = title;
                input.value = '';
                errorEl.textContent = '';
                errorEl.classList.add('hidden');
                overlay.style.display = 'flex';

                // 延迟聚焦，确保 DOM 渲染完成
                setTimeout(() => {
                    input.focus();
                    input.select();
                }, 80);

                function cleanup() {
                    confirmBtn.removeEventListener('click', onConfirm);
                    confirmBtn.removeEventListener('touchstart', onConfirmTouch);
                    cancelBtn.removeEventListener('click', onCancel);
                    cancelBtn.removeEventListener('touchstart', onCancelTouch);
                    input.removeEventListener('keydown', onKeydown);
                    overlay.removeEventListener('click', onOverlayClick);
                    promptResolve = null;
                    promptReject = null;
                }

                function onConfirm() {
                    const val = input.value.trim();
                    if (!val) {
                        errorEl.textContent = '名称不能为空';
                        errorEl.classList.remove('hidden');
                        input.focus();
                        return;
                    }
                    cleanup();
                    overlay.style.display = 'none';
                    resolve(val);
                }

                function onConfirmTouch(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    onConfirm();
                }

                function onCancel() {
                    cleanup();
                    overlay.style.display = 'none';
                    resolve(null);
                }

                function onCancelTouch(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    onCancel();
                }

                function onKeydown(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        onConfirm();
                    } else if (e.key === 'Escape') {
                        e.preventDefault();
                        onCancel();
                    }
                    // 输入时隐藏错误
                    if (errorEl.classList.contains('hidden') === false) {
                        errorEl.classList.add('hidden');
                        errorEl.textContent = '';
                    }
                }

                function onOverlayClick(e) {
                    if (e.target === overlay) {
                        onCancel();
                    }
                }

                // 按钮事件：touchstart + click，与文件中一致
                confirmBtn.addEventListener('click', onConfirm);
                confirmBtn.addEventListener('touchstart', onConfirmTouch, { passive: false });
                cancelBtn.addEventListener('click', onCancel);
                cancelBtn.addEventListener('touchstart', onCancelTouch, { passive: false });
                input.addEventListener('keydown', onKeydown);
                overlay.addEventListener('click', onOverlayClick);

                // 输入时清除错误状态
                input.addEventListener('input', function onInput() {
                    if (!errorEl.classList.contains('hidden')) {
                        errorEl.classList.add('hidden');
                        errorEl.textContent = '';
                    }
                });

                promptResolve = resolve;
                promptReject = reject;
            });
        }

        function showCustomAlert(message) {
            // 简易自定义 alert（使用同一个弹窗，只显示信息 + 确定按钮）
            return new Promise((resolve) => {
                const overlay = document.getElementById('custom-prompt-overlay');
                const input = document.getElementById('prompt-input');
                const errorEl = document.getElementById('prompt-error');
                const titleEl = document.getElementById('prompt-title');
                const confirmBtn = document.getElementById('prompt-confirm');
                const cancelBtn = document.getElementById('prompt-cancel');

                titleEl.textContent = message;
                input.style.display = 'none';
                errorEl.classList.add('hidden');
                errorEl.textContent = '';
                cancelBtn.style.display = 'none';
                confirmBtn.textContent = '确定';
                overlay.style.display = 'flex';

                function cleanup() {
                    confirmBtn.removeEventListener('click', onConfirm);
                    confirmBtn.removeEventListener('touchstart', onConfirmTouch);
                    overlay.removeEventListener('click', onOverlayClick);
                    input.style.display = '';
                    cancelBtn.style.display = '';
                    confirmBtn.textContent = '确定';
                }

                function onConfirm() {
                    cleanup();
                    overlay.style.display = 'none';
                    resolve();
                }

                function onConfirmTouch(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    onConfirm();
                }

                function onOverlayClick(e) {
                    if (e.target === overlay) {
                        onConfirm();
                    }
                }

                confirmBtn.addEventListener('click', onConfirm);
                confirmBtn.addEventListener('touchstart', onConfirmTouch, { passive: false });
                overlay.addEventListener('click', onOverlayClick);

                // 键盘支持
                const onKeydown = (e) => {
                    if (e.key === 'Enter' || e.key === 'Escape') {
                        e.preventDefault();
                        onConfirm();
                    }
                };
                document.addEventListener('keydown', onKeydown);
                // 保存清理引用
                const origCleanup = cleanup;
                cleanup = function() {
                    document.removeEventListener('keydown', onKeydown);
                    origCleanup();
                };
            });
        }
