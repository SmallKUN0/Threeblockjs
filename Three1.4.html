            fb.releasePointerCapture(e.pointerId);
            if (fbDragged) {
                localStorage.setItem('kball_pos', JSON.stringify({
                    left: fb.style.left,
                    top: fb.style.top
                }));
            }
        });

        fb.addEventListener('click', e => {
            if (fbDragged) return;
            openKeyboard();
        });

        function openKeyboard() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const kw = Math.min(920, vw * 0.92);
            const kh = Math.min(420, vh * 0.65);
            kb.style.width = kw + 'px';
            kb.style.height = kh + 'px';
            kb.style.left = (vw / 2 - kw / 2) + 'px';
            kb.style.top = (vh / 2 - kh / 2) + 'px';
            kb.style.display = 'block';
        }

        kbClose.addEventListener('click', e => {
            e.stopPropagation();
            kb.style.display = 'none';
        });
        kbClose.addEventListener('touchstart', e => {
            e.preventDefault();
            e.stopPropagation();
            kb.style.display = 'none';
        });

        let kbAction = null;
        let kbDragStart = {x:0, y:0, l:0, t:0};

        function startDrag(e) {
            if (kbAction) return;
            const cx = e.clientX ?? e.touches?.[0]?.clientX;
            const cy = e.clientY ?? e.touches?.[0]?.clientY;
            if (cx == null) return;
            kbAction = 'drag';
            kbDragStart = {
                x: cx, y: cy,
                l: parseFloat(kb.style.left),
                t: parseFloat(kb.style.top)
            };
            if (e.target.setPointerCapture) e.target.setPointerCapture(e.pointerId);
        }

        kbDrag.addEventListener('pointerdown', e => { e.stopPropagation(); startDrag(e); });
        kbDrag.addEventListener('touchstart', e => { e.stopPropagation(); startDrag(e); }, {passive: false});

        document.querySelectorAll('.drag-border').forEach(el => {
            el.addEventListener('pointerdown', e => { e.stopPropagation(); startDrag(e); });
            el.addEventListener('touchstart', e => { e.stopPropagation(); startDrag(e); }, {passive: false});
        });

        let kbResizeDir = '';
        let kbResizeStart = {x:0, y:0, w:0, h:0, l:0, t:0};

        document.querySelectorAll('.resize-handle').forEach(el => {
            el.addEventListener('pointerdown', e => {
                e.stopPropagation();
                if (kbAction) return;
                kbAction = 'resize';
                kbResizeDir = el.dataset.resize;
                kbResizeStart = {
                    x: e.clientX, y: e.clientY,
                    w: parseFloat(kb.style.width),
                    h: parseFloat(kb.style.height),
                    l: parseFloat(kb.style.left),
                    t: parseFloat(kb.style.top)
                };
                el.setPointerCapture(e.pointerId);
            });
        });

        window.addEventListener('pointermove', e => {
            if (!kbAction) return;
            if (kbAction === 'drag') {
                const dx = e.clientX - kbDragStart.x;
                const dy = e.clientY - kbDragStart.y;
                let nl = kbDragStart.l + dx;
                let nt = kbDragStart.t + dy;
                const w = parseFloat(kb.style.width);
                const h = parseFloat(kb.style.height);
                nl = Math.max(-w + 60, Math.min(window.innerWidth - 60, nl));
                nt = Math.max(-h + 60, Math.min(window.innerHeight - 60, nt));
                kb.style.left = nl + 'px';
                kb.style.top = nt + 'px';
            } else if (kbAction === 'resize') {
                const dx = e.clientX - kbResizeStart.x;
                const dy = e.clientY - kbResizeStart.y;
                const MIN_W = 380, MIN_H = 180;
                let nw = kbResizeStart.w;
                let nh = kbResizeStart.h;
                let nl = kbResizeStart.l;
                let nt = kbResizeStart.t;

                if (kbResizeDir.includes('r')) {
                    nw = Math.max(MIN_W, kbResizeStart.w + dx);
                }
                if (kbResizeDir.includes('l')) {
                    nw = Math.max(MIN_W, kbResizeStart.w - dx);
                    nl = kbResizeStart.l + (kbResizeStart.w - nw);
                }
                if (kbResizeDir.includes('b')) {
                    nh = Math.max(MIN_H, kbResizeStart.h + dy);
                }
                if (kbResizeDir.includes('t')) {
                    nh = Math.max(MIN_H, kbResizeStart.h - dy);
                    nt = kbResizeStart.t + (kbResizeStart.h - nh);
                }
                kb.style.width = nw + 'px';
                kb.style.height = nh + 'px';
                kb.style.left = nl + 'px';
                kb.style.top = nt + 'px';
            }
        });

        window.addEventListener('pointerup', () => {
            kbAction = null;
        });

        const virtualKeyStates = {};
        const virtualKeyIntervals = {};

        function triggerVirtualKeyAction(key) {
            if (key === 'LMB') breakBlock();
            else if (key === 'RMB') placeBlock();
            else if (key === 'Space') jump();
            else if (key === 'W' || key === 'w') input.w = true;
            else if (key === 'A' || key === 'a') input.a = true;
            else if (key === 'S' || key === 's') input.s = true;
            else if (key === 'D' || key === 'd') input.d = true;
            else {
                const joyKeys = controlSettings.buttons['joystick-zone']?.keys;
                if (joyKeys) {
                    if (key.toLowerCase() === joyKeys.forward.toLowerCase()) input.w = true;
                    if (key.toLowerCase() === joyKeys.back.toLowerCase()) input.s = true;
                    if (key.toLowerCase() === joyKeys.left.toLowerCase()) input.a = true;
                    if (key.toLowerCase() === joyKeys.right.toLowerCase()) input.d = true;
                }
                const btnCfg = controlSettings.buttons;
                if (btnCfg['jump-btn']?.key?.toLowerCase() === key.toLowerCase()) jump();
                if (btnCfg['break-btn']?.key?.toLowerCase() === key.toLowerCase()) breakBlock();
                if (btnCfg['place-btn']?.key?.toLowerCase() === key.toLowerCase()) placeBlock();
                if (btnCfg['select-btn']?.key?.toLowerCase() === key.toLowerCase()) cycleBlockType();
            }
        }

        function releaseVirtualKeyAction(key) {
            if (key === 'W' || key === 'w') input.w = false;
            else if (key === 'A' || key === 'a') input.a = false;
            else if (key === 'S' || key === 's') input.s = false;
            else if (key === 'D' || key === 'd') input.d = false;
            else {
                const joyKeys = controlSettings.buttons['joystick-zone']?.keys;
                if (joyKeys) {
                    if (key.toLowerCase() === joyKeys.forward.toLowerCase()) input.w = false;
                    if (key.toLowerCase() === joyKeys.back.toLowerCase()) input.s = false;
                    if (key.toLowerCase() === joyKeys.left.toLowerCase()) input.a = false;
                    if (key.toLowerCase() === joyKeys.right.toLowerCase()) input.d = false;
                }
            }
        }

        function onVirtualKeyPress(key) {
            if (!key || key === '') return;
            kbResponse.textContent = '响应：' + key;
            
            if (virtualKeyStates[key]) return;
            virtualKeyStates[key] = true;
            
            triggerVirtualKeyAction(key);
            
            if (!['W','A','S','D','w','a','s','d'].includes(key)) {
                virtualKeyIntervals[key] = setInterval(() => {
                    triggerVirtualKeyAction(key);
                }, 100);
            }
        }

        function onVirtualKeyRelease(key) {
            if (!virtualKeyStates[key]) return;
            virtualKeyStates[key] = false;
            
            releaseVirtualKeyAction(key);
            
            if (virtualKeyIntervals[key]) {
                clearInterval(virtualKeyIntervals[key]);
                delete virtualKeyIntervals[key];
            }
        }

        kbContent.addEventListener('touchstart', e => {
            if (e.target.classList.contains('kb-key')) {
                e.preventDefault();
                e.stopPropagation();
                onVirtualKeyPress(e.target.dataset.key);
            }
        }, {passive: false});

        kbContent.addEventListener('touchend', e => {
            if (e.target.classList.contains('kb-key')) {
                e.preventDefault();
                e.stopPropagation();
                onVirtualKeyRelease(e.target.dataset.key);
            }
        });

        kbContent.addEventListener('mousedown', e => {
            if (e.target.classList.contains('kb-key')) {
                e.stopPropagation();
                onVirtualKeyPress(e.target.dataset.key);
            }
        });

        kbContent.addEventListener('mouseup', e => {
            if (e.target.classList.contains('kb-key')) {
                e.stopPropagation();
                onVirtualKeyRelease(e.target.dataset.key);
            }
        });

        kbContent.addEventListener('mouseleave', e => {
            if (e.target.classList.contains('kb-key')) {
                onVirtualKeyRelease(e.target.dataset.key);
            }
        });

        function updateVirtualKeyboard() {
            const fb = document.getElementById('float-ball');
            if (settings.virtualKeyboard) {
                fb.style.display = 'flex';
            } else {
                fb.style.display = 'none';
                kb.style.display = 'none';
            }
        }

        loadWorlds();
        loadSettings();
        updateVirtualKeyboard();

        window.addEventListener('load', () => {
            const mainMenu = document.getElementById('main-menu');
            const splash = document.getElementById('splash-screen');
            
            setTimeout(() => {
                mainMenu.style.display = 'none';
                splash.style.display = 'flex';
                
                setTimeout(() => {
                    splash.style.display = 'none';
                    mainMenu.style.display = 'flex';
                    mainMenu.style.opacity = 1;
                }, 1000);
            }, 300);
        });
    </script>
</body>
</html>
