<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D方块世界</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #8B4513; user-select: none; -webkit-user-select: none; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #splash-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 200;
        }
        #splash-screen .gradient-text {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }
        
        #main-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 0.5s;
        }
        .menu-title { font-size: 4rem; font-weight: bold; color: black; margin-bottom: 50px; text-shadow: 2px 2px 0px rgba(255,255,255,0.2); }
        .menu-btn {
            background: transparent; border: 4px solid black; color: black;
            padding: 15px 40px; font-size: 1.5rem; font-weight: bold; margin: 10px;
            cursor: pointer; transition: transform 0.1s, background 0.2s;
            width: 250px; text-align: center;
        }
        .menu-btn:active { transform: scale(0.95); background: rgba(0,0,0,0.1); }
        
        #world-select-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #8B4513;
            background-image: url('https://cdn.jsdmirror.com/gh/Faithful-Pack/Default-Java@1.21.11/assets/minecraft/textures/block/dirt.png');
            background-repeat: repeat;
            background-size: 64px;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; color: white;
        }
        .select-title { font-size: 2.5rem; font-weight: bold; margin-bottom: 40px; }
        
        #view-worlds-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #8B4513;
            background-image: url('https://cdn.jsdmirror.com/gh/Faithful-Pack/Default-Java@1.21.11/assets/minecraft/textures/block/dirt.png');
            background-repeat: repeat;
            background-size: 64px;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 102; color: white;
        }
        
        #settings-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #8B4513;
            background-image: url('https://cdn.jsdmirror.com/gh/Faithful-Pack/Default-Java@1.21.11/assets/minecraft/textures/block/dirt.png');
            background-repeat: repeat;
            background-size: 64px;
            display: none; flex-direction: column;
            align-items: center;
            z-index: 101; color: white;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 40px 0;
        }
        .settings-title { font-size: 2.5rem; font-weight: bold; margin-bottom: 40px; }
        .setting-row { width: 300px; margin-bottom: 30px; }
        .setting-label { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 1.1rem; }
        input[type=range] { width: 100%; height: 8px; cursor: pointer; }
        
        #control-edit-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #8B4513;
            background-image: url('https://cdn.jsdmirror.com/gh/Faithful-Pack/Default-Java@1.21.11/assets/minecraft/textures/block/dirt.png');
            background-repeat: repeat;
            background-size: 64px;
            display: none; z-index: 103;
        }
        #control-edit-hint {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: #4CAF50; font-size: 1.5rem; font-weight: bold; text-align: center; width: 100%; pointer-events: none;
        }
        #control-edit-area {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        .edit-btn-proxy {
            position: absolute; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; border: 2px solid white; z-index: 10;
            touch-action: none;
        }
        .edit-btn-percent {
            position: absolute;
            top: -28px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #4CAF50;
            font-weight: bold;
            font-size: 12px;
            pointer-events: auto;
            z-index: 25;
            background: rgba(0,0,0,0.8);
            padding: 2px 0;
            border-radius: 4px;
            border: 1px solid #4CAF50;
            user-select: none;
        }
        
        #keymap-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #8B4513;
            background-image: url('https://cdn.jsdmirror.com/gh/Faithful-Pack/Default-Java@1.21.11/assets/minecraft/textures/block/dirt.png');
            background-repeat: repeat;
            background-size: 64px;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 104; color: white;
        }
        
        #edit-menu {
            display: none; position: absolute; background: rgba(0,0,0,0.9);
            border: 2px solid white; padding: 15px; border-radius: 10px; z-index: 105;
            color: white; min-width: 220px;
        }
        
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #8B4513;
            background-image: url('https://cdn.jsdmirror.com/gh/Faithful-Pack/Default-Java@1.21.11/assets/minecraft/textures/block/dirt.png');
            background-repeat: repeat;
            background-size: 64px;
            display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 99; color: white;
        }
        .progress-container { width: 300px; height: 30px; border: 2px solid white; margin-top: 20px; }
        .progress-bar { width: 0%; height: 100%; background-color: #4CAF50; transition: width 0.2s; }
        
        #game-ui { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 2px black;
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

        .game-btn {
            position: absolute; right: 40px;
            width: 80px; height: 80px; border-radius: 50%;
            border: 2px solid white; pointer-events: auto;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 0.9rem;
            z-index: 20; touch-action: none;
        }
        .game-btn:active { transform: scale(0.92); }

        #break-btn { bottom: 190px; background: rgba(255, 0, 0, 0.3); }
        #break-btn:active { background: rgba(255, 0, 0, 0.6); }

        #place-btn { bottom: 280px; background: rgba(0, 100, 255, 0.3); }
        #place-btn:active { background: rgba(0, 100, 255, 0.6); }

        #select-btn { bottom: 370px; background: rgba(0, 200, 100, 0.3); font-size: 0.75rem; }
        #select-btn:active { background: rgba(0, 200, 100, 0.6); }

        #jump-btn { bottom: 100px; background: rgba(255, 165, 0, 0.3); }
        #jump-btn:active { background: rgba(255, 165, 0, 0.6); }

        #coords {
            position: absolute; top: 10px; left: 10px; color: white; font-family: monospace;
            background: rgba(0,0,0,0.5); padding: 5px; font-size: 14px; pointer-events: none; z-index: 20;
        }

        #btn-return-main {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.5); color: white; border: 1px solid white;
            padding: 5px 10px; pointer-events: auto; z-index: 20; cursor: pointer;
        }
        #btn-return-main:active { background: rgba(0,0,0,0.8); }

        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px;
            pointer-events: auto; touch-action: none; z-index: 20;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
        }
        #joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%); pointer-events: none;
        }

        .version-info {
            position: absolute; bottom: 10px; right: 10px; color: rgba(255,255,255,0.7);
            font-size: 0.8rem; text-align: right; pointer-events: none;
        }
        #menu-version { bottom: 20px; right: 20px; color: rgba(0,0,0,0.5); }

        #popup-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 10000;
            display: none; align-items: center; justify-content: center;
        }
        #popup-content {
            background: white; border: 3px solid black; padding: 25px;
            max-width: 420px; text-align: center; color: black;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        #popup-text { margin-bottom: 25px; font-size: 16px; line-height: 1.6; white-space: pre-line; }
        #popup-buttons { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .popup-btn {
            background: white; border: 2px solid black; color: black;
            padding: 8px 16px; font-size: 14px; cursor: pointer; font-weight: bold;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .popup-btn:active { background: #eee; }

        #texture-preview-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 300; background-color: #87CEEB;
        }
        #texture-preview-hint {
            position: absolute; top: 35%; left: 50%; transform: translateX(-50%);
            color: #4CAF50; font-size: 1.2rem; font-weight: bold; z-index: 310;
            pointer-events: none; text-shadow: 1px 1px 2px black;
            text-align: center; width: 90%;
        }
        #btn-texture-reload {
            position: absolute; top: 15px; right: 15px; z-index: 310;
            background: rgba(0,0,0,0.7); color: white; border: 2px solid white;
            padding: 10px 20px; font-size: 1rem; cursor: pointer;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        #btn-preview-back {
            position: absolute; top: 15px; left: 15px; z-index: 310;
            background: rgba(0,0,0,0.7); color: white; border: 2px solid white;
            padding: 10px 20px; font-size: 1rem; cursor: pointer;
            font-family: 'Microsoft YaHei', sans-serif;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div style="display:flex; flex-direction:column; align-items:center;">
            <div style="display:flex; align-items:center;">
                <span style="font-size:3rem;">🏀</span>
                <span class="gradient-text">坤坤工作室</span>
            </div>
            <div style="color:#4CAF50; margin-top:15px; font-size:1rem; font-weight:bold;">
                加载此文件可能需要较长时间，请耐心等待……
            </div>
            <div style="width:300px; height:20px; border:2px solid white; margin-top:15px; background:rgba(0,0,0,0.5);">
                <div id="texture-progress-bar" style="width:0%; height:100%; background-color:#4CAF50; transition:width 0.2s;"></div>
            </div>
        </div>
    </div>

    <div id="main-menu">
        <div class="menu-title">3D方块世界</div>
        <button class="menu-btn" id="btn-start">开始游戏（A）</button>
        <button class="menu-btn" id="btn-settings">设置（B）</button>
        <div class="version-info" id="menu-version">小坤坤<br>版本号：1.5</div>
    </div>

    <div id="world-select-screen">
        <div class="select-title">选择世界</div>
        <button class="menu-btn" id="btn-create-random" style="border-color:white; color:white; width:300px;">创建随机世界（C）</button>
        <button class="menu-btn" id="btn-create-flat" style="border-color:white; color:white; width:300px; margin-top:10px;">创建超平坦世界（D）</button>
        <button class="menu-btn" id="btn-view-worlds" style="border-color:white; color:white; width:300px; margin-top:10px;">查看缓存世界（E）</button>
        <button class="menu-btn" id="btn-clear-worlds" style="border-color:white; color:white; width:300px; margin-top:10px;">清除缓存世界（F）</button>
        <button class="menu-btn" id="btn-back-menu" style="border-color:white; color:white; width:300px; margin-top:30px;">返回主菜单（H）</button>
    </div>

    <div id="view-worlds-screen">
        <div style="font-size:2rem; color:white; margin-bottom:20px;">缓存世界</div>
        <div id="view-worlds-list" style="display:flex; flex-direction:column; align-items:center; max-height:60vh; overflow-y:auto;"></div>
        <button class="menu-btn" id="btn-view-worlds-back" style="border-color:white; color:white; width:300px; margin-top:30px;">退出（H）</button>
    </div>

    <div id="settings-screen">
        <div class="settings-title">设置</div>
        <div class="setting-row">
            <div class="setting-label"><span>灵敏度</span><span id="sensitivity-val">100%</span></div>
            <input type="range" id="sensitivity-slider" min="50" max="500" value="100">
        </div>
        <div class="setting-row">
            <div class="setting-label"><span>渲染距离</span><span id="render-val">r=6</span></div>
            <input type="range" id="render-slider" min="5" max="20" value="6">
        </div>
        <div class="setting-row" style="display:flex; justify-content:space-between; align-items:center; width:300px; margin-bottom:30px;">
            <span style="font-size:1.1rem;">超平坦生成树</span>
            <input type="checkbox" id="flat-tree-toggle" style="width:20px; height:20px; cursor:pointer;">
        </div>
        <div class="setting-row" style="display:flex; justify-content:space-between; align-items:center; width:300px; margin-bottom:30px;">
            <span style="font-size:1.1rem;">草方块上生成草和花</span>
            <input type="checkbox" id="grass-flower-toggle" style="width:20px; height:20px; cursor:pointer;" checked>
        </div>
        <div class="setting-row" style="display:flex; flex-direction:column; align-items:flex-start; width:300px; margin-bottom:10px;">
            <span style="font-size:1.1rem;">区块渲染逻辑</span>
            <span style="color:#FF0000; font-size:0.85rem; margin-top:5px;">注：该选项可以减少GPU性能，但可能会出现一些令你困惑的bug</span>
            <div style="margin-top:10px; display:flex; flex-direction:column; gap:8px;">
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                    <input type="radio" name="chunk-render" id="chunk-render-full" value="full" checked style="width:18px; height:18px;">
                    <span>全面（默认）</span>
                </label>
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                    <input type="radio" name="chunk-render" id="chunk-render-partial" value="partial" style="width:18px; height:18px;">
                    <span>局部</span>
                </label>
            </div>
        </div>
        <div class="setting-row" style="display:flex; justify-content:space-between; align-items:center; width:300px; margin-bottom:30px;">
            <span style="font-size:1.1rem;">禁用CDN贴图</span>
            <input type="checkbox" id="disable-cdn-toggle" style="width:20px; height:20px; cursor:pointer;">
        </div>
        <button class="menu-btn" id="btn-control-edit" style="border-color:white; color:white; width:300px; margin-top:10px;">操作方式（G）</button>
        <button class="menu-btn" id="btn-save-exit" style="border-color:white; color:white; margin-top:20px;">保存并退出（Tab）</button>
    </div>

    <div id="control-edit-screen">
        <div id="control-edit-hint">拖动改变按钮位置，长按编辑按钮</div>
        <div id="control-edit-area"></div>
        <button class="menu-btn" id="btn-control-save" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); border-color:white; color:white;">保存并退出（Tab）</button>
    </div>

    <div id="keymap-screen">
        <div style="font-size:2rem; color:white; margin-bottom:10px;">按键映射</div>
        <div id="keymap-hint" style="color:white; margin-bottom:10px;">点击选择按键</div>
        <div id="keymap-grid" style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px; max-width:90%;"></div>
        <button class="menu-btn" id="btn-keymap-back" style="border-color:white; color:white; margin-top:30px;">返回（H）</button>
    </div>

    <div id="edit-menu">
        <div style="margin-bottom:10px; font-weight:bold; text-align:center;">按钮设置</div>
        <div style="margin-bottom:10px;">
            <div>大小: <span id="edit-size-val">100%</span></div>
            <input type="range" id="edit-size" min="50" max="300" value="100" style="width:100%;">
        </div>
        <div style="margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
            <span>游戏内隐藏</span>
            <input type="checkbox" id="edit-hidden">
        </div>
        <button class="menu-btn" id="btn-edit-keymap" style="border-color:white; color:white; width:100%; margin:5px 0; padding:8px; font-size:1rem;">键鼠相对按键</button>
        <button class="menu-btn" id="btn-edit-menu-save" style="border-color:white; color:white; width:100%; margin-top:5px; padding:8px; font-size:1rem;">保存并退出（Tab）</button>
    </div>

    <div id="loading-screen">
        <div style="font-size: 1.5rem;">正在进入方块世界……</div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <div id="game-ui">
        <div id="crosshair"></div>
        <div id="coords">X: 0 Y: 0 Z: 0</div>
        <button id="btn-return-main">返回主菜单</button>
        
        <div class="game-btn" id="select-btn">草块</div>
        <div class="game-btn" id="place-btn">放置</div>
        <div class="game-btn" id="break-btn">破坏</div>
        <div class="game-btn" id="jump-btn">跳跃</div>

        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>
        <div class="version-info">小坤坤<br>版本号：1.5</div>
    </div>

    <div id="popup-modal">
        <div id="popup-content">
            <div id="popup-text"></div>
            <div id="popup-buttons"></div>
        </div>
    </div>

    <div id="texture-preview-screen">
        <div id="texture-preview-hint">等待全部贴图加载完成，再点击右上方按钮</div>
        <button id="btn-texture-reload">点击重新加载</button>
        <button id="btn-preview-back">返回</button>
    </div>

    <script>
        const CONFIG = {
            chunkSize: 10,
            cameraHeight: 1.6,
            moveSpeed: 5,
            gravity: 25,
            blockSize: 1,
            reach: 5,
            worldBottom: -100
        };

        const BASE_1_21 = 'https://cdn.jsdmirror.com/gh/Faithful-Pack/Default-Java@1.21.11/assets/minecraft/textures/block/';
        const BASE_1_8  = 'https://cdn.jsdmirror.com/gh/InventivetalentDev/minecraft-assets@1.8/assets/minecraft/textures/blocks/';
        const BASE_1_20 = 'https://cdn.jsdmirror.com/gh/Faithful-Pack/Default-Java@1.20/assets/minecraft/textures/block/';
        const GRASS_TINT = 0x5ba836;

        const TEXTURE_DEFS = [
            { name: 'grass_top', url: BASE_1_8 + 'grass_top.png', fallback: '#4CAF50', tint: GRASS_TINT },
            { name: 'grass_block_side', url: BASE_1_21 + 'grass_block_side.png', fallback: '#4CAF50' },
            { name: 'dirt', url: BASE_1_21 + 'dirt.png', fallback: '#8B4513' },
            { name: 'stone', url: BASE_1_21 + 'stone.png', fallback: '#A9A9A9' },
            { name: 'bedrock', url: BASE_1_21 + 'bedrock.png', fallback: '#404040' },
            { name: 'oak_sapling', url: BASE_1_21 + 'oak_sapling.png', fallback: '#4CAF50' },
            { name: 'leaves_oak', url: BASE_1_8 + 'leaves_oak.png', fallback: '#228B22', tint: GRASS_TINT },
            { name: 'oak_planks', url: BASE_1_21 + 'oak_planks.png', fallback: '#C19A6B' },
            { name: 'oak_log_top', url: BASE_1_21 + 'oak_log_top.png', fallback: '#8B4513' },
            { name: 'oak_log', url: BASE_1_21 + 'oak_log.png', fallback: '#8B4513' },
            { name: 'short_grass', url: BASE_1_21 + 'short_grass.png', fallback: '#4CAF50', tint: GRASS_TINT },
            { name: 'tall_grass_top', url: BASE_1_21 + 'tall_grass_top.png', fallback: '#4CAF50', tint: GRASS_TINT },
            { name: 'tall_grass_bottom', url: BASE_1_21 + 'tall_grass_bottom.png', fallback: '#4CAF50', tint: GRASS_TINT },
            { name: 'repeater', url: BASE_1_21 + 'repeater.png', fallback: '#8B4513' },
            { name: 'smooth_stone', url: BASE_1_21 + 'smooth_stone.png', fallback: '#A9A9A9' },
            { name: 'redstone_lamp', url: BASE_1_21 + 'redstone_lamp.png', fallback: '#8B4513' },
            { name: 'coal_ore', url: BASE_1_21 + 'coal_ore.png', fallback: '#A9A9A9' },
            { name: 'diamond_ore', url: BASE_1_21 + 'diamond_ore.png', fallback: '#A9A9A9' },

        function onPreviewTouchStart(e) {
            if (e.touches.length === 1) {
                previewLastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        }

        function onPreviewTouchMove(e) {
            if (!previewLastTouch || e.touches.length !== 1) return;
            e.preventDefault();
            const dx = e.touches[0].clientX - previewLastTouch.x;
            const dy = e.touches[0].clientY - previewLastTouch.y;
            previewRotY -= dx * 0.005;
            previewRotX -= dy * 0.005;
            previewRotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, previewRotX));
            previewLastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            updatePreviewCamera();
        }

        function onPreviewTouchEnd(e) {
            previewLastTouch = null;
        }

        let isPreviewMouseDown = false;
        function onPreviewMouseDown(e) {
            isPreviewMouseDown = true;
            previewLastTouch = { x: e.clientX, y: e.clientY };
        }

        function onPreviewMouseMove(e) {
            if (!isPreviewMouseDown) return;
            const dx = e.clientX - previewLastTouch.x;
            const dy = e.clientY - previewLastTouch.y;
            previewRotY -= dx * 0.005;
            previewRotX -= dy * 0.005;
            previewRotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, previewRotX));
            previewLastTouch = { x: e.clientX, y: e.clientY };
            updatePreviewCamera();
        }

        function onPreviewMouseUp() {
            isPreviewMouseDown = false;
            previewLastTouch = null;
        }

        function updatePreviewCamera() {
            const radius = 25;
            previewCamera.position.x = Math.sin(previewRotY) * Math.cos(previewRotX) * radius;
            previewCamera.position.y = Math.sin(previewRotX) * radius + 5;
            previewCamera.position.z = Math.cos(previewRotY) * Math.cos(previewRotX) * radius;
            previewCamera.lookAt(0, 2, 0);
        }

                hint.style.color = '#00FF00';
            }

        function applyControlSettings() {
            const cfg = controlSettings.buttons;
            for (const [id, setting] of Object.entries(cfg)) {
                const el = document.getElementById(id);
                if (!el) continue;
                if (setting.pos) {
                    if (setting.pos.right !== undefined) el.style.right = setting.pos.right + 'px';
                    if (setting.pos.left !== undefined) el.style.left = setting.pos.left + 'px';
                    if (setting.pos.bottom !== undefined) el.style.bottom = setting.pos.bottom + 'px';
                }
                if (setting.size) {
                    const baseSize = id === 'joystick-zone' ? 150 : 80;
                    const newSize = baseSize * (setting.size / 100);
                    el.style.width = newSize + 'px';
                    el.style.height = newSize + 'px';
                }
                el.style.display = setting.hidden ? 'none' : (id === 'joystick-zone' ? 'block' : 'flex');
            }

        let fallbackBase64Cache = {};
        function createFallbackTexture(baseColor) {
            if (fallbackBase64Cache[baseColor]) {
                const loader = new THREE.TextureLoader();
                const texture = loader.load(fallbackBase64Cache[baseColor]);
                texture.magFilter = THREE.NearestFilter;
                texture.minFilter = THREE.NearestFilter;
                return texture;
            }
            const canvas = document.createElement('canvas');
            canvas.width = 8;
            canvas.height = 8;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, 8, 8);
            for (let i = 0; i < 8 * 8; i++) {
                const x = i % 8;
                const y = Math.floor(i / 8);
                const variation = (Math.random() - 0.5) * 15;
                const r = parseInt(baseColor.slice(1, 3), 16);
                const g = parseInt(baseColor.slice(3, 5), 16);
                const b = parseInt(baseColor.slice(5, 7), 16);
                const newR = Math.max(0, Math.min(255, r + variation));
                const newG = Math.max(0, Math.min(255, g + variation));
                const newB = Math.max(0, Math.min(255, b + variation));
                ctx.fillStyle = `rgb(${Math.floor(newR)},${Math.floor(newG)},${Math.floor(newB)})`;
                ctx.fillRect(x, y, 1, 1);
            }
            ctx.strokeStyle = 'rgba(0,0,0,0.15)';
            ctx.strokeRect(0, 0, 8, 8);
            const base64 = canvas.toDataURL('image/png');
            fallbackBase64Cache[baseColor] = base64;
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter;
            texture.minFilter = THREE.NearestFilter;
            return texture;
        }

        function getTexture(name) {
            if (textureCache[name]) return textureCache[name];
            if (isFallbackMode) {
                const def = TEXTURE_DEFS.find(d => d.name === name);
                if (def) {
                    textureCache[def.name] = createFallbackTexture(def.fallback);
                    return textureCache[def.name];
                }
            }
            return null;
        }

        function preloadTextures(isRetry = false) {
            if (settings.disableCDN) {
                isFallbackMode = true;
                TEXTURE_DEFS.forEach(def => {
                    if (!textureCache[def.name]) {
                        textureCache[def.name] = createFallbackTexture(def.fallback);
                    }
                });
                loadingComplete = true;
                tryEnterMainMenu();
                return Promise.resolve([]);
            }

            const base1_21 = BASE_1_21;
            const base1_8 = BASE_1_8;
            
            textureLoadTotal = TEXTURE_DEFS.length;
            textureLoadProgress = 0;
            textureLoadFailed = false;
            
            const promises = TEXTURE_DEFS.map(def => {
                const url = def.url.replace(BASE_1_21, base1_21).replace(BASE_1_8, base1_8);
                return new Promise((resolve) => {
                    const loader = new THREE.TextureLoader();
                    loader.load(url,
                        (texture) => {
                            texture.magFilter = THREE.NearestFilter;
                            texture.minFilter = THREE.NearestFilter;
                            textureCache[def.name] = texture;
                            textureLoadProgress++;
                            updateTextureProgress();
                            resolve(true);
                        },
                        undefined,
                        (err) => {
                            console.warn('贴图加载失败:', url);
                            textureLoadFailed = true;
                            textureLoadProgress++;
                            updateTextureProgress();
                            resolve(false);
                        }
                    );
                });
            });
            
            const timeoutPromise = new Promise((resolve) => {
                setTimeout(() => {
                    textureLoadFailed = true;
                    resolve('timeout');
                }, 10000);
            });
            
            return Promise.race([Promise.all(promises), timeoutPromise]);
        }

        function updateTextureProgress() {
            const bar = document.getElementById('texture-progress-bar');
            if (bar) {
                const pct = textureLoadTotal > 0 ? (textureLoadProgress / textureLoadTotal) * 100 : 100;
                bar.style.width = pct + '%';
            }
        }
