        function enterGame() {
            stopMenuRotation();
            document.getElementById('world-select-screen').style.display = 'none';
            document.getElementById('view-worlds-screen').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';
            
            worldBlocks = {};
            blockMeshesArray.forEach(m => scene.remove(m));
            blockMeshes = {};
            blockMeshesArray = [];
            activeBlocks = new Set();
            chunkBlocks = {};
            generatedChunks = new Set();
            renderedChunks = new Set();
            naturalLeaves = new Set();
            leavesDecayTimers = {};
            saplingTimers = {};
            leverStates = {};
            redstoneData = {};
            stoneOres = {};
            tntTimers = {};
            pendingMeshes = [];
            particles.forEach(p => scene.remove(p));
            particles = [];
            gravityEnabled = false;
            player.vx = 0; player.vy = 0; player.vz = 0; player.onGround = false;
            
            if (!scene) initThree();
            loadSettings();
            loadControlSettings();
            applyControlSettings();
            
            if (currentWorld && currentWorld.worldBlocks) {
                worldBlocks = {...currentWorld.worldBlocks};
                naturalLeaves = new Set(currentWorld.naturalLeaves || []);
                saplingTimers = currentWorld.saplingTimers || {};
                leverStates = currentWorld.leverStates || {};
                redstoneData = currentWorld.redstoneData || {};
                stoneOres = currentWorld.stoneOres || {};
                for (const key in worldBlocks) {
                    const [x, y, z] = key.split(',').map(Number);
                    const ck = getChunkKey(x, z);
                    if (!chunkBlocks[ck]) chunkBlocks[ck] = new Set();
                    chunkBlocks[ck].add(key);
                    generatedChunks.add(ck);
                }
            }
            
            let progress = 0;
            const bar = document.getElementById('progress-bar');
            const interval = setInterval(() => {
                progress += 30 + Math.random() * 20;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    bar.style.width = '100%';
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('game-ui').style.display = 'block';
                    
                    const preloadRange = Math.ceil(settings.renderDistance / CONFIG.chunkSize) + 1;
                    for (let cx = -preloadRange; cx <= preloadRange; cx++) {
                        for (let cz = -preloadRange; cz <= preloadRange; cz++) {
                            const ck = `${cx},${cz}`;
                            if (!generatedChunks.has(ck)) {
                                generateChunkData(cx, cz);
                                generatedChunks.add(ck);
                            }
                        }
                    }
                    rebuildChunkBlocks();
                    
                    for (let x = -2; x <= 2; x++) {
                        for (let z = -2; z <= 2; z++) {
                            const h = getSurfaceHeight(x, z);
                            for (let y = h; y >= CONFIG.worldBottom; y--) {
                                if (isExposed(x, y, z)) {
                                    const type = getBlockType(x, y, z);
                                    if (type) createBlockMesh(x, y, z, type);
                                }
                            }
                        }
                    }
                    
                    for (let cx = -1; cx <= 1; cx++) {
                        for (let cz = -1; cz <= 1; cz++) {
                            activateChunk(cx, cz);
                            renderedChunks.add(`${cx},${cz}`);
                        }
                    }
                    
                    isGameRunning = true;
                    lastTime = performance.now();
                    lastFrameTime = performance.now();
                    requestAnimationFrame(animate);
                    updateRedstone();
                    playMusic();
                    return;
                }
                bar.style.width = progress + '%';
            }, 30);
        }

        function promptCreateWorld(type) {
            const name = prompt('请输入世界名称：');
            if (!name || name.trim() === '') return;
            if (worlds.find(w => w.name === name.trim())) {
                alert('该名称已存在！');
                return;
            }
            currentWorld = {
                name: name.trim(),
                type: type,
                created: Date.now(),
                placedBlocks: {},
                destroyedBlocks: [],
                playerPos: {x: 0, y: 1.6, z: 0},
                playerRot: {yaw: 0, pitch: 0}
            };
            worlds.push(currentWorld);
            if (worlds.length > 3) worlds.shift();
            saveWorlds();
            placedBlocks = {};
            destroyedBlocks = new Set();
            naturalLeaves = new Set();
            leavesDecayTimers = {};
            saplingTimers = {};
            leverStates = {};
            redstoneData = {};
            stoneOres = {};
            tntTimers = {};
            player.x = 0; player.y = 1.6; player.z = 0;
            yaw = 0; pitch = 0;
            enterGame();
        }

        function loadWorldFromSave(index) {
            currentWorld = JSON.parse(JSON.stringify(worlds[index]));
            placedBlocks = currentWorld.placedBlocks || {};
            destroyedBlocks = new Set(currentWorld.destroyedBlocks || []);
            naturalLeaves = new Set(currentWorld.naturalLeaves || []);
            saplingTimers = currentWorld.saplingTimers || {};
            leverStates = currentWorld.leverStates || {};
            redstoneData = currentWorld.redstoneData || {};
            stoneOres = currentWorld.stoneOres || {};
            tntTimers = {};
            player.x = currentWorld.playerPos?.x || 0;
            player.y = currentWorld.playerPos?.y || 1.6;
            player.z = currentWorld.playerPos?.z || 0;
            yaw = currentWorld.playerRot?.yaw || 0;
            pitch = currentWorld.playerRot?.pitch || 0;
            enterGame();
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('world-select-screen').style.display = 'flex';
        });

        document.getElementById('btn-settings').addEventListener('click', () => {
            loadSettings();
            document.getElementById('settings-screen').style.display = 'flex';
        });

        document.getElementById('btn-create-random').addEventListener('click', () => promptCreateWorld('random'));
        document.getElementById('btn-create-flat').addEventListener('click', () => promptCreateWorld('superflat'));

        document.getElementById('btn-view-worlds').addEventListener('click', () => {
            document.getElementById('world-select-screen').style.display = 'none';
            const screen = document.getElementById('view-worlds-screen');
            const list = document.getElementById('view-worlds-list');
            list.innerHTML = '';
            
            if (worlds.length === 0) {
                const div = document.createElement('div');
                div.style.cssText = 'color:white; text-align:center; padding:20px;';
                div.innerText = '暂无缓存世界';
                list.appendChild(div);
            } else {
                worlds.forEach((w, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'menu-btn';
                    btn.style.cssText = 'border-color:white; color:white; width:300px; margin:5px; padding:15px;';
                    btn.innerText = `${w.name} (${w.type === 'superflat' ? '超平坦' : '随机'})`;
                    btn.onclick = () => loadWorldFromSave(i);
                    list.appendChild(btn);
                });
            }
            
            screen.style.display = 'flex';
        });

        document.getElementById('btn-view-worlds-back').addEventListener('click', () => {
            document.getElementById('view-worlds-screen').style.display = 'none';
            document.getElementById('world-select-screen').style.display = 'flex';
        });

        document.getElementById('btn-clear-worlds').addEventListener('click', () => {
            if (confirm('确定要清除所有缓存世界吗？')) {
                worlds = [];
                localStorage.removeItem('blockworld_worlds_v2');
                alert('已清除所有缓存世界');
            }
        });

        document.getElementById('btn-back-menu').addEventListener('click', () => {
            document.getElementById('world-select-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('main-menu').style.opacity = 1;
        });

        document.getElementById('sensitivity-slider').addEventListener('input', (e) => {
            settings.sensitivity = parseInt(e.target.value);
            document.getElementById('sensitivity-val').innerText = settings.sensitivity + '%';
        });

        document.getElementById('render-slider').addEventListener('input', (e) => {
            settings.renderDistance = parseInt(e.target.value);
            document.getElementById('render-val').innerText = 'r=' + settings.renderDistance;
        });

        document.getElementById('btn-control-edit').addEventListener('click', () => {
            document.getElementById('settings-screen').style.display = 'none';
            openControlEdit();
        });

        document.getElementById('grass-flower-toggle').addEventListener('change', () => {
            saveSettings();
        });

        document.getElementById('btn-save-exit').addEventListener('click', () => {
            const oldDisableCDN = settings.disableCDN;
            saveSettings();
            document.getElementById('settings-screen').style.display = 'none';
            
            if (settings.disableCDN !== oldDisableCDN) {
                if (isGameRunning) {
                    try {
                        saveCurrentWorld();
                    } catch (e) {}
                    stopMusic();
                    isGameRunning = false;
                    worldBlocks = {};
                    blockMeshesArray.forEach(m => scene.remove(m));
                    blockMeshes = {};
                    blockMeshesArray = [];
                    activeBlocks = new Set();
                    chunkBlocks = {};
                    generatedChunks = new Set();
                    renderedChunks = new Set();
                    naturalLeaves = new Set();
                    leavesDecayTimers = {};
                    saplingTimers = {};
                    leverStates = {};
                    redstoneData = {};
                    stoneOres = {};
                    tntTimers = {};
                    placedBlocks = {};
                    destroyedBlocks = new Set();
                    pendingMeshes = [];
                    particles.forEach(p => scene.remove(p));
                    particles = [];
                    document.getElementById('game-ui').style.display = 'none';
                    generateInitialWorld();
                    startMenuRotation();
                    document.getElementById('main-menu').style.display = 'flex';
                    document.getElementById('main-menu').style.opacity = 1;
                }
                
                fallbackBase64Cache = {};
                textureCache = {};
                isFallbackMode = false;
                loadingComplete = false;
                minSplashTimePassed = true;
                document.getElementById('splash-screen').style.display = 'flex';
                document.getElementById('texture-progress-bar').style.width = '0%';
                textureLoadProgress = 0;
                textureLoadFailed = false;
                
                if (settings.disableCDN) {
                    isFallbackMode = true;
                    TEXTURE_DEFS.forEach(def => {
                        textureCache[def.name] = createFallbackTexture(def.fallback);
                    });
                    loadingComplete = true;
                    tryEnterMainMenu();
                } else {
                    preloadTextures().then((results) => {
                        if (results === 'timeout' || (Array.isArray(results) && results.some(r => !r))) {
                            showTextureFailPopup();
                        } else {
                            loadingComplete = true;
                            tryEnterMainMenu();
                        }
                    });
                }
                return;
            }
            
            if (isGameRunning) {
                returnToMainMenu();
            }
        });

        document.getElementById('btn-return-main').addEventListener('click', returnToMainMenu);

        document.getElementById('btn-texture-reload').addEventListener('click', () => {
            closeTexturePreview();
            loadingComplete = false;
            minSplashTimePassed = true;
            document.getElementById('splash-screen').style.display = 'flex';
            document.getElementById('texture-progress-bar').style.width = '0%';
            textureLoadProgress = 0;
            textureLoadFailed = false;
            textureCache = {};
            isFallbackMode = false;
            
            preloadTextures().then((results) => {
                if (results === 'timeout' || (Array.isArray(results) && results.some(r => !r))) {
                    showTextureFailPopup(false);
                } else {
                    loadingComplete = true;
                    tryEnterMainMenu();
                }
            });
        });

        document.getElementById('btn-preview-back').addEventListener('click', () => {
            closeTexturePreview();
            showTextureFailPopup();
        });

        function initMenuTouch() {
            const buttons = document.querySelectorAll('.menu-btn, #btn-return-main');
            buttons.forEach(btn => {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    btn.click();
                }, {passive: false});
            });
        }
        initMenuTouch();

        loadWorlds();
        loadSettings();

        window.addEventListener('load', () => {
            const mainMenu = document.getElementById('main-menu');
            const splash = document.getElementById('splash-screen');
            
            mainMenu.style.display = 'none';
            splash.style.display = 'flex';
            
            setTimeout(() => {
                minSplashTimePassed = true;
                tryEnterMainMenu();
            }, 700);
            
            preloadTextures().then((results) => {
                if (results === 'timeout' || (Array.isArray(results) && results.some(r => !r))) {
                    showTextureFailPopup();
                } else {
                    loadingComplete = true;
                    tryEnterMainMenu();
                }
            });
        });
    </script>
</body>
</html>
